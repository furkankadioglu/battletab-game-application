<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>BattleTab</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      overscroll-behavior: none;
      background: #06060e;
      font-family: 'Inter', sans-serif;
      color: #d0d0e0;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>
  <!-- Animated background canvas (auth screen) -->
  <div id="bg-canvas"></div>

  <!-- Auth UI (React) — z-index 9999 -->
  <div id="auth-root" style="position:fixed;inset:0;z-index:9999;display:none;"></div>

  <!-- Menu UI (React) — z-index 100 -->
  <div id="menu-root" style="position:fixed;inset:0;z-index:100;display:none;"></div>

  <!-- Game (Phaser canvas + React HUD overlay) -->
  <div id="game" style="width:100%;height:100dvh;touch-action:none;overflow:hidden;display:none;">
    <div id="game-ui-root" style="position:absolute;inset:0;z-index:10;pointer-events:none;"></div>
  </div>

  <script type="module" src="/src/index.js"></script>
</body>
</html>
